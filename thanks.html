
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Form Submitted</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #28a745, #20c997);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: #333;
}

.container {
    background: #fff;
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 450px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

.icon {
    font-size: 60px;
    color: #28a745;
}

h2 {
    margin: 10px 0;
}

.details {
    text-align: left;
    margin-top: 20px;
    background: #f8f9fa;
    padding: 15px;
    border-radius: 10px;
}

.details p {
    margin: 8px 0;
    font-size: 14px;
}

.btn {
    margin-top: 20px;
    display: inline-block;
    padding: 10px 20px;
    background: #28a745;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #218838;
}
</style>
</head>

<body>

<div class="container">

    <div class="icon">✅</div>

    <h2>Booking Form Submitted!</h2>
    <p>Thank you for your booking. We will contact you shortly.</p>

    <div class="details">
        <p><strong>Name:</strong> <span id="name"></span></p>
        <p><strong>Mobile:</strong> <span id="mobile"></span></p>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>Check-in:</strong> <span id="checkin"></span></p>
        <p><strong>Check-out:</strong> <span id="checkout"></span></p>
        <p><strong>Adults:</strong> <span id="adults"></span></p>
        <p><strong>Children:</strong> <span id="children"></span></p>
    </div>

    <a href="index.html" class="btn">← Back to Home</a>

</div>

<script>
document.getElementById("name").innerText = localStorage.getItem("name") || "-";
document.getElementById("mobile").innerText = localStorage.getItem("mobile") || "-";
document.getElementById("email").innerText = localStorage.getItem("email") || "-";
document.getElementById("checkin").innerText = localStorage.getItem("checkin") || "-";
document.getElementById("checkout").innerText = localStorage.getItem("checkout") || "-";
document.getElementById("adults").innerText = localStorage.getItem("adults") || "-";
document.getElementById("children").innerText = localStorage.getItem("children") || "-";
</script>

</body>
</html>
